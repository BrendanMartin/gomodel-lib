name: Upstream Sync
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Copybara
        run: |
          LATEST=$(gh api repos/google/copybara/releases/latest --jq .tag_name)
          curl -L -o copybara_deploy.jar "https://github.com/google/copybara/releases/download/${LATEST}/copybara_deploy.jar"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run sync
        run: |
          java -jar copybara_deploy.jar copy.bara.sky default
          go mod tidy
          go build ./...
      - name: Create PR
        if: success()
        run: |
          BRANCH="upstream-sync-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "upstream sync: $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "upstream sync: $(date +%Y-%m-%d)" --body "Automated sync from ENTERPILOT/GoModel upstream."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
